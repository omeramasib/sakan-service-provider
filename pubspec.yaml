name: sakan
version: 1.0.0+1
publish_to: none
description: A new Flutter project.
environment:
  sdk: '>=2.18.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  cupertino_icons: ^1.0.5
  get: ^4.6.5
  flutter:
    sdk: flutter
  flutter_svg: ^1.1.6
  get_storage: ^2.1.1
  flutter_otp_text_field: ^1.1.1
  pin_code_fields: ^7.4.0
  status_change: ^2.0.0
  image_picker: ^0.8.7+5
  google_maps_flutter: ^2.2.8
  geolocator: ^8.2.1
  geocoding: ^2.0.5
  flutter_easyloading: ^3.0.3
  connectivity_plus: ^3.0.6
  http: ^0.13.5
  http_parser: ^4.0.1
  shimmer: ^2.0.0
  flutter_native_splash: ^2.2.16


dependency_overrides:
  flutter_spinkit: 5.2.1

dev_dependencies:
  flutter_lints: ^1.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.9.0

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/sakan-logo.png"
  android: true
  ios: true

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/sakan-logo.png"

flutter:
  uses-material-design: true

  assets:
  - assets/images/

  fonts:
  - family:  Montserrat-Arabic
    fonts:
      - asset: assets/fonts/Montserrat-Arabic-Black.ttf
        weight: 700
      - asset: assets/fonts/Montserrat-Arabic-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/Montserrat-Arabic-Bold.ttf
        weight: 700
      - asset: assets/fonts/Montserrat-Arabic-ExtraBold.ttf
        weight: 800
      - asset: assets/fonts/Montserrat-Arabic-ExtraLight.ttf
        weight: 400
      - asset: assets/fonts/Montserrat-Arabic-Light.ttf
        weight: 300
      - asset: assets/fonts/Montserrat-Arabic-Medium.ttf
        weight: 500
      - asset: assets/fonts/Montserrat-Arabic-Regular.ttf
        weight: 400
      - asset: assets/fonts/Montserrat-Arabic-Thin.ttf
        weight: 100

